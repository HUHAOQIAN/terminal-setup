# ===== 基础设置 =====
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",tmux-256color:Tc,xterm-256color:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 0
set -gw xterm-keys on

# ===== 前缀键改为 Ctrl+a（更顺手） =====
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ===== 分屏快捷键（更直观） =====
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ===== 面板切换（Shift + 方向键，无需前缀） =====
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

# ===== 面板大小调整（前缀 + HJKL） =====
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# ===== 快速重载配置 =====
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ===== 状态栏美化 =====
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1a1b26,fg=#a9b1d6"

# 左侧：会话名
set -g status-left-length 30
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1a1b26] "

# 右侧：时间
set -g status-right-length 50
set -g status-right "#[fg=#565f89] %H:%M #[fg=#1a1b26,bg=#7aa2f7,bold] #H "

# 窗口标签
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#bb9af7,bold] #I:#W "

# 面板边框
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# 消息样式
set -g message-style "fg=#7aa2f7,bg=#1a1b26,bold"

# ===== 滚动优化（每次滚轮只滚 1 行） =====
bind -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X scroll-down

# ===== 插件 =====
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# 初始化 TPM
run '~/.tmux/plugins/tpm/tpm'
